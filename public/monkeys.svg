<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128" width="512" height="128" shape-rendering="geometricPrecision">
  <defs>
    <radialGradient id="bodyShade" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#6b3e1a"/>
    </radialGradient>
    <radialGradient id="bellyShade" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#e0b078"/>
      <stop offset="100%" stop-color="#c99055"/>
    </radialGradient>
    <linearGradient id="bananaShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff28a"/>
      <stop offset="70%" stop-color="#ffe14d"/>
      <stop offset="100%" stop-color="#c5a020"/>
    </linearGradient>
  </defs>

  <!-- ============ FRAME 0 : CROUCH ============ -->
  <g>
    <!-- tail curling back -->
    <path d="M 82 82 Q 102 86 106 102 Q 107 114 96 116" fill="none" stroke="#6b3e1a" stroke-width="6" stroke-linecap="round"/>
    <!-- back (left) arm tucked behind -->
    <path d="M 52 78 Q 38 82 34 94" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- body -->
    <ellipse cx="64" cy="86" rx="22" ry="20" fill="url(#bodyShade)"/>
    <!-- belly -->
    <ellipse cx="64" cy="89" rx="14" ry="13" fill="url(#bellyShade)"/>
    <!-- back leg bent -->
    <path d="M 54 100 Q 44 108 40 116 L 52 118 Q 58 110 60 104 Z" fill="#6b3e1a"/>
    <!-- front leg bent -->
    <path d="M 74 100 Q 84 108 88 116 L 76 118 Q 70 110 68 104 Z" fill="#6b3e1a"/>
    <!-- head -->
    <circle cx="64" cy="52" r="20" fill="url(#bodyShade)"/>
    <!-- ears -->
    <circle cx="47" cy="42" r="7" fill="#6b3e1a"/><circle cx="47" cy="42" r="3.5" fill="#c99055"/>
    <circle cx="81" cy="42" r="7" fill="#6b3e1a"/><circle cx="81" cy="42" r="3.5" fill="#c99055"/>
    <!-- face -->
    <ellipse cx="64" cy="56" rx="14" ry="14" fill="url(#bellyShade)"/>
    <!-- eyes closed (crouch = focus) small dashes -->
    <path d="M 55 54 L 61 54" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M 67 54 L 73 54" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- cheek blush -->
    <circle cx="55" cy="62" r="2.5" fill="#ef9a6b" opacity="0.65"/>
    <circle cx="73" cy="62" r="2.5" fill="#ef9a6b" opacity="0.65"/>
    <!-- determined mouth -->
    <path d="M 59 64 Q 64 66 69 64" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- front (right) arm with banana -->
    <path d="M 78 78 Q 92 82 98 94" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- banana -->
    <g transform="translate(92 88) rotate(15)">
      <path d="M -8 0 Q 0 -6 10 -2 Q 12 4 4 6 Q -6 6 -8 0 Z" fill="url(#bananaShade)" stroke="#8b6914" stroke-width="0.8"/>
      <path d="M 10 -2 L 13 -4" stroke="#8b6914" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============ FRAME 1 : LIFT-OFF ============ -->
  <g transform="translate(128 0)">
    <!-- tail rising -->
    <path d="M 82 72 Q 104 66 108 50" fill="none" stroke="#6b3e1a" stroke-width="6" stroke-linecap="round"/>
    <!-- back arm swinging forward -->
    <path d="M 52 68 Q 42 58 38 48" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- body lifted -->
    <ellipse cx="64" cy="76" rx="20" ry="22" fill="url(#bodyShade)"/>
    <ellipse cx="64" cy="80" rx="12" ry="14" fill="url(#bellyShade)"/>
    <!-- back leg extending -->
    <path d="M 56 92 Q 50 106 48 118 L 58 118 Q 62 106 62 96 Z" fill="#6b3e1a"/>
    <!-- front leg extending -->
    <path d="M 72 92 Q 78 106 80 118 L 70 118 Q 66 106 66 96 Z" fill="#6b3e1a"/>
    <!-- head -->
    <circle cx="64" cy="42" r="20" fill="url(#bodyShade)"/>
    <circle cx="47" cy="32" r="7" fill="#6b3e1a"/><circle cx="47" cy="32" r="3.5" fill="#c99055"/>
    <circle cx="81" cy="32" r="7" fill="#6b3e1a"/><circle cx="81" cy="32" r="3.5" fill="#c99055"/>
    <ellipse cx="64" cy="46" rx="14" ry="14" fill="url(#bellyShade)"/>
    <!-- open eyes -->
    <circle cx="58" cy="44" r="2.2" fill="#1a1a1a"/>
    <circle cx="70" cy="44" r="2.2" fill="#1a1a1a"/>
    <circle cx="58.5" cy="43.5" r="0.7" fill="#ffffff"/>
    <circle cx="70.5" cy="43.5" r="0.7" fill="#ffffff"/>
    <circle cx="55" cy="52" r="2.5" fill="#ef9a6b" opacity="0.65"/>
    <circle cx="73" cy="52" r="2.5" fill="#ef9a6b" opacity="0.65"/>
    <!-- open mouth — excited -->
    <ellipse cx="64" cy="56" rx="3" ry="2.5" fill="#1a1a1a"/>
    <!-- front arm swinging forward with banana -->
    <path d="M 78 68 Q 90 58 96 46" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <g transform="translate(96 42) rotate(-30)">
      <path d="M -8 0 Q 0 -6 10 -2 Q 12 4 4 6 Q -6 6 -8 0 Z" fill="url(#bananaShade)" stroke="#8b6914" stroke-width="0.8"/>
      <path d="M 10 -2 L 13 -4" stroke="#8b6914" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============ FRAME 2 : PEAK (arms overhead, banana raised) ============ -->
  <g transform="translate(256 0)">
    <!-- tail curled up high -->
    <path d="M 82 62 Q 106 50 108 32 Q 106 22 96 22" fill="none" stroke="#6b3e1a" stroke-width="6" stroke-linecap="round"/>
    <!-- back arm overhead -->
    <path d="M 52 58 Q 48 40 52 22" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- body stretched -->
    <ellipse cx="64" cy="68" rx="18" ry="24" fill="url(#bodyShade)"/>
    <ellipse cx="64" cy="72" rx="11" ry="16" fill="url(#bellyShade)"/>
    <!-- legs together, toes down -->
    <path d="M 58 90 Q 56 108 58 120 L 66 120 Q 68 108 66 90 Z" fill="#6b3e1a"/>
    <path d="M 66 90 Q 68 108 70 120 L 78 120 Q 76 108 74 90 Z" fill="#6b3e1a"/>
    <!-- head -->
    <circle cx="64" cy="34" r="20" fill="url(#bodyShade)"/>
    <circle cx="47" cy="24" r="7" fill="#6b3e1a"/><circle cx="47" cy="24" r="3.5" fill="#c99055"/>
    <circle cx="81" cy="24" r="7" fill="#6b3e1a"/><circle cx="81" cy="24" r="3.5" fill="#c99055"/>
    <ellipse cx="64" cy="38" rx="14" ry="14" fill="url(#bellyShade)"/>
    <!-- happy closed eyes ^ ^ -->
    <path d="M 54 36 Q 58 32 62 36" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M 66 36 Q 70 32 74 36" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <circle cx="55" cy="44" r="2.5" fill="#ef9a6b" opacity="0.7"/>
    <circle cx="73" cy="44" r="2.5" fill="#ef9a6b" opacity="0.7"/>
    <!-- big smile -->
    <path d="M 57 46 Q 64 52 71 46" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- front arm overhead holding banana high -->
    <path d="M 76 58 Q 80 40 76 22" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- triumphant banana -->
    <g transform="translate(76 16) rotate(-90)">
      <path d="M -10 0 Q 0 -7 12 -2 Q 14 5 4 7 Q -8 7 -10 0 Z" fill="url(#bananaShade)" stroke="#8b6914" stroke-width="0.9"/>
      <path d="M 12 -2 L 16 -5" stroke="#8b6914" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="-3" cy="1" r="1" fill="#c5a020" opacity="0.7"/>
    </g>
    <!-- sparkles around peak -->
    <path d="M 30 20 L 34 20 M 32 18 L 32 22" stroke="#ffe14d" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 100 10 L 104 10 M 102 8 L 102 12" stroke="#ffe14d" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ============ FRAME 3 : DESCEND ============ -->
  <g transform="translate(384 0)">
    <!-- tail forward for balance -->
    <path d="M 82 74 Q 100 84 104 100" fill="none" stroke="#6b3e1a" stroke-width="6" stroke-linecap="round"/>
    <!-- back arm out wide -->
    <path d="M 52 74 Q 34 72 28 84" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- body coming down -->
    <ellipse cx="64" cy="78" rx="21" ry="21" fill="url(#bodyShade)"/>
    <ellipse cx="64" cy="82" rx="13" ry="13" fill="url(#bellyShade)"/>
    <!-- legs tucking for landing -->
    <path d="M 54 94 Q 46 100 44 108 L 54 112 Q 60 104 62 98 Z" fill="#6b3e1a"/>
    <path d="M 74 94 Q 82 100 84 108 L 74 112 Q 68 104 66 98 Z" fill="#6b3e1a"/>
    <!-- head -->
    <circle cx="64" cy="44" r="20" fill="url(#bodyShade)"/>
    <circle cx="47" cy="34" r="7" fill="#6b3e1a"/><circle cx="47" cy="34" r="3.5" fill="#c99055"/>
    <circle cx="81" cy="34" r="7" fill="#6b3e1a"/><circle cx="81" cy="34" r="3.5" fill="#c99055"/>
    <ellipse cx="64" cy="48" rx="14" ry="14" fill="url(#bellyShade)"/>
    <!-- wide eyes -->
    <circle cx="58" cy="46" r="2.5" fill="#1a1a1a"/>
    <circle cx="70" cy="46" r="2.5" fill="#1a1a1a"/>
    <circle cx="58.5" cy="45.2" r="0.8" fill="#ffffff"/>
    <circle cx="70.5" cy="45.2" r="0.8" fill="#ffffff"/>
    <circle cx="55" cy="54" r="2.5" fill="#ef9a6b" opacity="0.65"/>
    <circle cx="73" cy="54" r="2.5" fill="#ef9a6b" opacity="0.65"/>
    <!-- open mouth "whoa" -->
    <ellipse cx="64" cy="58" rx="2.5" ry="3" fill="#1a1a1a"/>
    <!-- front arm out wide catching banana tossed from other hand -->
    <path d="M 78 74 Q 96 72 102 84" fill="none" stroke="#6b3e1a" stroke-width="8" stroke-linecap="round"/>
    <!-- banana airborne above -->
    <g transform="translate(64 22) rotate(45)">
      <path d="M -8 0 Q 0 -6 10 -2 Q 12 4 4 6 Q -6 6 -8 0 Z" fill="url(#bananaShade)" stroke="#8b6914" stroke-width="0.8"/>
      <path d="M 10 -2 L 13 -4" stroke="#8b6914" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- motion lines -->
    <path d="M 40 14 L 46 20" stroke="#a3e635" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 88 14 L 82 20" stroke="#a3e635" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
